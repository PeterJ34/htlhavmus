<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27th March 2026 - timeline.html</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Bootstrap JS (required for accordion) -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- External JS -->
  <script defer src="js/master.js"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/master.css">
</head>

<body>
  <!--Navigation bar-->
  <div id="nav-placeholder"></div>
  <script>
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;
      })
      .catch(error => {
        console.error('Error loading the navigation:', error);
      });
  </script>
  <div class="container container-sh">

    <h2 class="search-title">Search Havering Timeline</h2>

    <!-- 6th March CHANGE: Split into two-column layout: Search Functions (Left 30%) and Results (Right 70%) -->
    <div class="search-container">

      <!-- 6th March CHANGE: LEFT SIDEBAR: Search Functions (30%) -->
      <div class="search-sidebar">

        <!-- Year Search -->
        <div class="search-section">
          <label for="year"><b>Search by Year:</b></label><br>
          <input id="year" type="text" placeholder="e.g. 1833 or '49 BC'" class="timeline-viewer-input">
          <button id="show" class="timeline-viewer-button">Show events for this year</button>
        </div>

        <!-- Timeline Search -->
        <div class="search-section">
          <label for="searchQuery"><b>Keyword Search:</b></label><br>
          <input id="searchQuery" type="text" placeholder="e.g. event, name, location" class="timeline-viewer-input">
          <button id="searchBtn" class="timeline-viewer-button">Show matches</button>
        </div>

        <!-- Category Search -->
        <div class="search-section">
          <label><b>Search by Category:</b></label><br>
          <div class="category-options">
            <div>
              <input type="radio" id="catcollection" name="category" value="catcollection"> <label
                for="catcollection">Havering
                Museum Collection</label>
            </div>
            <div>
              <input type="radio" id="catplace" name="category" value="catplace"> <label for="catplace">Place</label>
            </div>
            <div>
              <input type="radio" id="catsport" name="category" value="catsport"> <label for="catsport">Sport</label>
            </div>
            <div>
              <input type="radio" id="catpeople" name="category" value="catpeople"> <label
                for="catpeople">People</label>
            </div>
          </div><br><!-- 12 March 2026 - category search button removed (radio buttons trigger search automatically) -->
          <!-- <button id="categorySearchBtn">Search</button> --></div>

      </div>

      <!-- 6th March CHANGE: RIGHT SECTION: Search Results (70%) -->
      <div class="search-results">

        <div id="output"></div>

        <div id="category-output"></div>

      </div>

    </div>

  </div>

</body>

</html>
